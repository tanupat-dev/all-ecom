name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Real env vars win over phpunit.xml <env> values (force="false").
      DB_PORT: '5432'

    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, intl, zip, gd, bcmath
          coverage: none

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Build assets
        run: npm ci --no-fund --no-audit && npm run build

      # Tests must NOT run as the image superuser — superusers always bypass
      # RLS and the isolation suite (ADR 0011/0018) would prove nothing.
      - name: Provision non-superuser test role
        run: |
          psql postgresql://postgres:postgres@127.0.0.1:5432/postgres <<'SQL'
          CREATE ROLE all_ecom LOGIN PASSWORD 'all_ecom'
              NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS;
          CREATE DATABASE all_ecom_test OWNER all_ecom;
          SQL

      - name: Pint (format)
        run: ./vendor/bin/pint --test

      - name: Larastan (level max)
        run: ./vendor/bin/phpstan analyse --no-progress

      - name: Pest
        run: ./vendor/bin/pest --ci
